events {
  worker_connections 1024;
  multi_accept on;
}

http {
  # ─── Basic ──────────────────────────────────────────────────
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  # ─── Logging ────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  error_log   /var/log/nginx/error.log   warn;

  # ─── Rate Limiting ──────────────────────────────────────────
  limit_req_zone  $binary_remote_addr  zone=api:10m  rate=30r/s;
  limit_req_zone  $binary_remote_addr  zone=auth:10m rate=10r/m;

  # ─── Compression ────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/xml+rss image/svg+xml;

  # ─── Security Headers ───────────────────────────────────────
  add_header X-Frame-Options          "SAMEORIGIN" always;
  add_header X-Content-Type-Options   "nosniff" always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

  # ─── SSL ────────────────────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # ─── Upstream ───────────────────────────────────────────────
  upstream api {
    server api:4000;
    keepalive 32;
  }

  # ─── HTTP → HTTPS Redirect ──────────────────────────────────
  server {
    listen 80 default_server;
    server_name api.falcondrivingschool.ng falcondrivingschool.ng;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── API Server (api.falcondrivingschool.ng) ────────────────
  server {
    listen 443 ssl http2;
    server_name api.falcondrivingschool.ng;

    ssl_certificate     /etc/letsencrypt/live/api.falcondrivingschool.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.falcondrivingschool.ng/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none';" always;

    # Rate limiting
    limit_req zone=api burst=50 nodelay;

    location / {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }
  }

  # ─── Frontend (falcondrivingschool.ng) ──────────────────────
  server {
    listen 443 ssl http2;
    server_name falcondrivingschool.ng www.falcondrivingschool.ng;

    ssl_certificate     /etc/letsencrypt/live/falcondrivingschool.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/falcondrivingschool.ng/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:; frame-ancestors 'none';" always;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with caching
    location /_next/static {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    location /images {
      expires 30d;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # SPA fallback
    location / {
      try_files $uri $uri.html $uri/ /index.html;
      expires -1;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
  }
}
