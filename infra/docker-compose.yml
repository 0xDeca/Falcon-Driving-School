version: "3.9"

name: falcon-driving-school

services:
  redis:
    image: redis:7-alpine
    container_name: falcon-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - falcon-net
    ports:
      - "127.0.0.1:6379:6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: falcon-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../.env.production
    networks:
      - falcon-net
    expose:
      - "4000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  nginx:
    image: nginx:1.27-alpine
    container_name: falcon-nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - falcon-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.3"

  certbot:
    image: certbot/certbot:latest
    container_name: falcon-certbot
    restart: unless-stopped
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: sh -c "trap exit TERM; while :; do sleep 12h & wait; certbot renew; done"
    networks:
      - falcon-net

networks:
  falcon-net:
    driver: bridge
    name: falcon-net

volumes:
  redis_data:
    name: falcon-redis-data
  certbot_data:
    name: falcon-certbot-data
  certbot_www:
    name: falcon-certbot-www
