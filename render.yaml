services:
  - type: web
    name: falcon-api
    runtime: node
    repo: https://github.com/0xDeca/Falcon-Driving-School
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Falcon Driving School <noreply@falcondrivingschool.ng>
      - key: FRONTEND_URL
        value: https://falcondrivingschool.ng
      - key: API_URL
        value: https://falcon-api.onrender.com
      - key: COOKIE_DOMAIN
        sync: false
